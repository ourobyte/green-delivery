<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Delivery - Greencentermart</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#ffffff">
</head>

<body>

<header>
    <h1>Tambah Data Delivery</h1>

    <div class="header-action">
        <button type="button" onclick="location.href='index.html'">
            ← Kembali
        </button>
    </div>
</header>

<main>

<form id="deliveryForm" enctype="multipart/form-data">

    <!-- NAMA -->
    <section>
        <label for="nama">Nama Penerima</label>
        <input type="text" id="nama" required autocomplete="off">
    </section>

    <!-- ALAMAT -->
    <section>
        <label for="alamat">Alamat Lengkap Rumah</label>
        <textarea id="alamat" rows="5" required></textarea>
    </section>

    <!-- KOORDINAT (FIX REPLACE SHARELOCK) -->
    <section>

        <label>Koordinat Lokasi</label>

        <input
            type="number"
            id="lat"
            placeholder="Latitude (contoh: -6.3645443)"
            step="any"
            required
        >

        <input
            type="number"
            id="lng"
            placeholder="Longitude (contoh: 106.8663167)"
            step="any"
            required
        >

        <small>
            Masukkan koordinat dari Google Maps (klik kanan → copy latitude/longitude)
        </small>

    </section>

    <!-- KETERANGAN -->
    <section>
        <label for="keterangan">Keterangan Tempat</label>
        <textarea id="keterangan" rows="4"></textarea>
    </section>

    <!-- FOTO -->
    <section>
        <label for="foto">Foto Rumah</label>

        <input type="file" id="foto" accept="image/*">

        <img
            id="previewFoto"
            style="display:none;max-width:100%;margin-top:10px;"
        >
    </section>

    <!-- MAP PREVIEW -->
    <section>

        <label>Preview Lokasi</label>

        <iframe
            id="mapsPreview"
            style="width:100%;height:300px;border:1px solid #ccc;"
            loading="lazy"
            allowfullscreen
        ></iframe>

    </section>

    <!-- ACTION -->
    <section class="form-action">

        <button type="submit" id="submitBtn">
            Simpan Data
        </button>

        <button type="reset">
            Reset
        </button>

    </section>

</form>

<div id="status" style="margin-top:20px;"></div>

</main>

<script src="app.js"></script>

<script>

const form = document.getElementById("deliveryForm");

const latInput = document.getElementById("lat");
const lngInput = document.getElementById("lng");

const mapsPreview = document.getElementById("mapsPreview");

const fotoInput = document.getElementById("foto");
const previewFoto = document.getElementById("previewFoto");

const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

/*
|--------------------------------------------------------------------------
| FOTO PREVIEW
|--------------------------------------------------------------------------
*/
fotoInput.addEventListener("change", () => {

    const file = fotoInput.files[0];

    if (!file) {
        previewFoto.style.display = "none";
        return;
    }

    const reader = new FileReader();

    reader.onload = e => {
        previewFoto.src = e.target.result;
        previewFoto.style.display = "block";
    };

    reader.readAsDataURL(file);
});

/*
|--------------------------------------------------------------------------
| MAP PREVIEW (KOORDINAT)
|--------------------------------------------------------------------------
*/
function updateMap() {

    const lat = latInput.value;
    const lng = lngInput.value;

    if (!lat || !lng) {
        mapsPreview.removeAttribute("src");
        return;
    }

    mapsPreview.src =
        `https://www.google.com/maps?q=${lat},${lng}&output=embed`;
}

latInput.addEventListener("input", updateMap);
lngInput.addEventListener("input", updateMap);

/*
|--------------------------------------------------------------------------
| SUBMIT
|--------------------------------------------------------------------------
*/
form.addEventListener("submit", async (e) => {

    e.preventDefault();

    statusEl.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Menyimpan...";

    try {

        const formData = new FormData();

        formData.append("nama", document.getElementById("nama").value.trim());
        formData.append("alamat", document.getElementById("alamat").value.trim());

        formData.append("lat", latInput.value);
        formData.append("lng", lngInput.value);

        formData.append("keterangan", document.getElementById("keterangan").value.trim());

        if (fotoInput.files.length > 0) {
            formData.append("foto", fotoInput.files[0]);
        }

        const result = await addDelivery(formData);

        statusEl.textContent = result.message || "Data berhasil disimpan.";

        form.reset();
        previewFoto.style.display = "none";
        mapsPreview.removeAttribute("src");

        setTimeout(() => {
            location.href = "index.html";
        }, 1000);

    } catch (err) {

        console.error(err);
        statusEl.textContent = err.message || "Gagal menyimpan data.";

    } finally {

        submitBtn.disabled = false;
        submitBtn.textContent = "Simpan Data";

    }

});

</script>

</body>
</html>
