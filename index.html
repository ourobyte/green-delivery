```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Greencentermart</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#ffffff">
</head>
<body>

    <header>
        <h1>Delivery Greencentermart</h1>
    </header>

    <main>

        <section>
            <div>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Cari nama, alamat, atau keterangan..."
                    autocomplete="off"
                >

                <button id="searchBtn">
                    Cari
                </button>

                <button id="refreshBtn">
                    Refresh
                </button>

                <button
                    type="button"
                    onclick="location.href='add.html'">
                    Tambah Data
                </button>
            </div>
        </section>

        <hr>

        <section>
            <h2>Hasil Pencarian</h2>

            <div id="status">
                Memuat data...
            </div>

            <div id="resultList"></div>
        </section>

    </main>

    <template id="deliveryTemplate">

        <article class="delivery-card">

            <h3 class="nama"></h3>

            <p>
                <strong>Alamat:</strong><br>
                <span class="alamat"></span>
            </p>

            <p>
                <strong>Keterangan:</strong><br>
                <span class="keterangan"></span>
            </p>

            <div class="foto-container">
                <img
                    class="foto"
                    alt="Foto Rumah"
                    loading="lazy"
                >
            </div>

            <div class="maps-container">
                <iframe
                    class="maps"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="actions">

                <button class="lihat-rute">
                    Buka Maps
                </button>

                <button class="edit-data">
                    Edit
                </button>

            </div>

        </article>

    </template>

    <script src="app.js"></script>

    <script>

        document.addEventListener("DOMContentLoaded", async () => {

            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("sw.js")
                    .catch(console.error);
            }

            await loadAllData();

        });

        document
            .getElementById("searchBtn")
            .addEventListener("click", searchData);

        document
            .getElementById("refreshBtn")
            .addEventListener("click", loadAllData);

        document
            .getElementById("searchInput")
            .addEventListener("keydown", async (e) => {

                if (e.key === "Enter") {
                    await searchData();
                }

            });

    </script>

</body>
</html>
```
